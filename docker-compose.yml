services:
  generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: dotnet-source-generator-toolkit:2.0.0
    container_name: source-generator
    ports:
      - "8080:8080"

    volumes:
      - ./src:/workspace/src:ro
      - ./Generated:/workspace/Generated
      - ./config:/config:ro
      - generator-logs:/var/log/toolkit

    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_EnableDiagnostics=0
      - TOOLKIT_CONFIG=/config/toolkit-config.json

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    restart: unless-stopped

    networks:
      - generator-network

    healthcheck:
      test: ["CMD", "dotnet", "--list-runtimes"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  generator-network:
    driver: bridge

volumes:
  generator-logs:
    driver: local
